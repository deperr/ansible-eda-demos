---

- name: Listen for STIG File Changes
  hosts: all
  sources:
    - ansible.eda.kafka:
        host: web03.dperrone.dev
        port: 9092
        topic: eda-topic
        group_id: eda-demo-group

  rules:

    # - name: Catch Everything and Print to Log
    #   condition: event.body is defined
    #   action:
    #     debug:
    #       msg: "RAW AAP EVENT PAYLOAD: {{ event }}"

    # - name: Detect activity on /etc/shadow
    #   condition: >
    #     event.body.log.file.path == "/var/log/audit/audit.log"
    #     and event.body.message is search("shadow|fstab|sshd_config|hosts")
    #   # condition: event.body.message is search("shadow|fstab|sshd_config|hosts")
    #   # Change 'action' to 'actions' to accept a list of tasks
    #   actions:
    #     # 1. Print a custom debug message to the EDA Activation History log
    #     - debug:
    #         msg: "MATCH FOUND! STIG violation detected on {{ event.body.host.name }}. Launching remediation job..."

    #         # 2. Fire the Job Template in Automation Controller
    #     - run_job_template:
    #         name: "EDA | STIG Remediation"
    #         organization: "Default"
    #         job_args:
    #           extra_vars:
    #             target_server: "{{ event.body.host.name }}"
    #             offending_message: "{{ event.body.message }}"

    - name: Detect activity on Protected Files
      condition: >
        event.body.log.file.path == "/var/log/audit/audit.log"
        and event.body.message is search("type=SYSCALL")
        and event.body.message is search("_monitor")

      throttle:
        once_within: 1 minute
        group_by_attributes:
          - event.body.host.name
          - event.body.log.file.path

      actions:
        - debug:
            msg: "STIG violation detected on {{ event.body.host.name }}. Throttling active to prevent loops."

        - run_job_template:
            name: "EDA | STIG | Remediate "
            organization: "Default"
            job_args:
              extra_vars:
                target_server: "{{ event.body.host.name }}"
                offending_message: "{{ event.body.message }}"
